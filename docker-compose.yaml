services:
  db:
    image: postgres:16-alpine
    container_name: spring-boot-postgres
    environment:
      POSTGRES_USER: yumi
      POSTGRES_PASSWORD: yumiblog
      POSTGRES_DB: yumi_blog_developments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
